<!doctype html><html><head><meta charset="utf-8"></head>
<body style="margin:0"><div id="r">PENDING</div>
<iframe id="f" src="index.html" style="width:390px;height:800px;border:0"></iframe>
<script>
const f=document.getElementById('f');
f.addEventListener('load',()=>{
  setTimeout(()=>{
    const doc=f.contentDocument, de=doc.documentElement, vw=390;
    let out='scrollW='+de.scrollWidth+' scrollH='+de.scrollHeight+'\n';
    const bad=[];
    doc.querySelectorAll('body *').forEach(el=>{
      const r=el.getBoundingClientRect();
      if(r.right>vw+1){ bad.push((el.tagName+'.'+(el.className||'').toString().split(' ')[0])+' R'+Math.round(r.right)+' W'+Math.round(r.width)); }
    });
    out+='OVERFLOW '+bad.length+':\n'+bad.slice(0,16).join('\n');
    document.getElementById('r').textContent=out;
  },600);
});
</script></body></html>
